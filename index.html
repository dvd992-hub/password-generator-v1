  <!-- Application stylesheet -->
  <link rel="stylesheet" href="css/style.css" />

  <!--
    i18n module — loaded before app.js so t() is available immediately.
    Must be a classic script (not type="module") to keep global scope simple
    without a bundler.
  -->
  <script src="i18n/translations.js"></script>

<body>

  <!-- ============================================================
       SVG SPRITE
       All icons defined here as <symbol> elements.
       Referenced anywhere with <svg><use href="#icon-NAME"/></svg>.
       Kept in the document so no CDN request is needed — the app
       works fully offline.
       ============================================================ -->
  <svg xmlns="http://www.w3.org/2000/svg" style="display:none;" aria-hidden="true">

    <!-- Lock — app heading -->
    <symbol id="icon-lock" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
      <rect x="5" y="11" width="14" height="10" rx="2"/>
      <path d="M8 11V7a4 4 0 0 1 8 0v4"/>
    </symbol>

    <!-- Eye (open) — show password -->
    <symbol id="icon-eye" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
      <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
      <circle cx="12" cy="12" r="3"/>
    </symbol>

    <!-- Eye (closed) — hide password -->
    <symbol id="icon-eye-off" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
      <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8
               a18.45 18.45 0 0 1 5.06-5.94"/>
      <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8
               a18.5 18.5 0 0 1-2.16 3.19"/>
      <line x1="1" y1="1" x2="23" y2="23"/>
    </symbol>

    <!-- Copy — clipboard -->
    <symbol id="icon-copy" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
      <rect x="9" y="9" width="13" height="13" rx="2"/>
      <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
    </symbol>

    <!-- Refresh — regenerate -->
    <symbol id="icon-refresh" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
      <polyline points="23 4 23 10 17 10"/>
      <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
    </symbol>

    <!-- Clock — history section -->
    <symbol id="icon-clock" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="10"/>
      <polyline points="12 6 12 12 16 14"/>
    </symbol>

    <!-- Check — copy feedback toast -->
    <symbol id="icon-check" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
      <polyline points="20 6 9 17 4 12"/>
    </symbol>

    <!-- Sparkles — generate button -->
    <symbol id="icon-sparkles" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 3l1.88 5.76a1 1 0 0 0 .95.69h6.06l-4.91 3.57
               a1 1 0 0 0-.36 1.12L17.5 20l-4.91-3.57a1 1 0 0 0-1.18 0
               L6.5 20l1.88-5.86a1 1 0 0 0-.36-1.12L3.11 9.45h6.06
               a1 1 0 0 0 .95-.69L12 3z"/>
    </symbol>

  </svg><!-- /SVG sprite -->


  <!-- ============================================================
       MAIN LAYOUT
       .pg-wrapper  — full-width flex container for centering
       .pg          — constrained-width app column (max 520 px)
       ============================================================ -->
  <div class="pg-wrapper">
    <div class="pg">

      <!-- ──────────────────────────────────────────────
           NAV BAR — language toggle (EN | IT)
           Buttons carry data-lang attributes read by JS.
           The active class is set programmatically by
           syncLangButtons() on startup and locale change.
           ────────────────────────────────────────────── -->
      <nav class="pg-nav" aria-label="Language">
        <div class="lang-toggle" id="lang-toggle" role="group">
          <button class="lang-btn" data-lang="en">EN</button>
          <button class="lang-btn" data-lang="it">IT</button>
        </div>
      </nav>

      <!-- App heading -->
      <h1 class="pg-heading">
        <svg class="icon" aria-hidden="true">
          <use href="#icon-lock"/>
        </svg>
        <!-- Text node — updated by applyTranslations() -->
        <span id="pg-heading-text">Password Generator</span>
      </h1>

      <!-- ──────────────────────────────────────────────
           TAB BAR — Password / Passphrase
           ARIA role="tablist" + role="tab" for screen readers.
           JS toggles .active + aria-selected on click.
           ────────────────────────────────────────────── -->
      <div class="pg-tabs" id="pg-tabs" role="tablist">
        <!-- tab-pass is active by default -->
        <button class="pg-tab active" id="tab-pass"
                role="tab" aria-selected="true" aria-controls="pane-pass">
          Password
        </button>
        <button class="pg-tab" id="tab-phrase"
                role="tab" aria-selected="false" aria-controls="pane-phrase">
          Passphrase
        </button>
      </div>

      <!-- ──────────────────────────────────────────────
           OUTPUT FIELD
           aria-live="polite" announces changes to screen readers
           without interrupting the user mid-action.
           ────────────────────────────────────────────── -->
      <div class="pg-output">

        <!-- Generated password / passphrase text -->
        <span class="pg-pass" id="pg-pass"
              aria-live="polite" aria-label="Generated password">—</span>

        <!-- Action buttons -->
        <div class="pg-actions" role="group">

          <!-- Show / hide (password mode only — hidden in passphrase mode) -->
          <button class="pg-btn-icon" id="pg-eye">
            <svg class="icon" id="pg-eye-icon" aria-hidden="true">
              <use href="#icon-eye"/>
            </svg>
          </button>

          <!-- Copy to clipboard -->
          <button class="pg-btn-icon" id="pg-copy">
            <svg class="icon" aria-hidden="true">
              <use href="#icon-copy"/>
            </svg>
          </button>

          <!-- Regenerate -->
          <button class="pg-btn-icon" id="pg-refresh">
            <svg class="icon" aria-hidden="true">
              <use href="#icon-refresh"/>
            </svg>
          </button>

        </div>
      </div><!-- /pg-output -->

      <!-- ──────────────────────────────────────────────
           STRENGTH METER
           Four bars coloured by JS; bar colour conveys
           both the level and the meaning (red→teal).
           Hidden from assistive tech (aria-hidden) because
           pg-slabel conveys the same info as text.
           ────────────────────────────────────────────── -->
      <div class="pg-meter" aria-hidden="true">
        <div class="pg-bar" id="b0"></div>
        <div class="pg-bar" id="b1"></div>
        <div class="pg-bar" id="b2"></div>
        <div class="pg-bar" id="b3"></div>
      </div>
      <!-- Text version of the strength level for screen readers -->
      <div class="pg-slabel" id="pg-slabel" aria-live="polite"></div>


      <!-- ============================================================
           PASSWORD OPTIONS PANEL
           Shown when the "Password" tab is active.
           ============================================================ -->
      <div id="pane-pass" role="tabpanel" aria-labelledby="tab-pass">
        <div class="pg-card">

          <!-- Length slider (6–64) -->
          <div class="pg-rrow">
            <label class="pg-lbl" id="lbl-length" for="pg-len">Length</label>
            <input type="range" id="pg-len"
                   min="6" max="64" value="16" step="1" />
            <span class="pg-rval" id="pg-len-val">16</span>
          </div>

          <!-- Uppercase toggle -->
          <div class="pg-row">
            <div>
              <div class="pg-lbl" id="lbl-upper">Uppercase</div>
              <div class="pg-sub" id="lbl-upper-sub">A – Z</div>
            </div>
            <label class="pg-toggle" id="toggle-upper">
              <input type="checkbox" id="opt-upper" checked />
              <span class="pg-knob"></span>
            </label>
          </div>

          <!-- Lowercase toggle -->
          <div class="pg-row">
            <div>
              <div class="pg-lbl" id="lbl-lower">Lowercase</div>
              <div class="pg-sub" id="lbl-lower-sub">a – z</div>
            </div>
            <label class="pg-toggle" id="toggle-lower">
              <input type="checkbox" id="opt-lower" checked />
              <span class="pg-knob"></span>
            </label>
          </div>

          <!-- Numbers toggle -->
          <div class="pg-row">
            <div>
              <div class="pg-lbl" id="lbl-nums">Numbers</div>
              <div class="pg-sub" id="lbl-nums-sub">0 – 9</div>
            </div>
            <label class="pg-toggle" id="toggle-num">
              <input type="checkbox" id="opt-num" checked />
              <span class="pg-knob"></span>
            </label>
          </div>

          <!-- Symbols toggle -->
          <div class="pg-row">
            <div>
              <div class="pg-lbl" id="lbl-syms">Symbols</div>
              <div class="pg-sub" id="lbl-syms-sub">! @ # $ % ^ &amp; *</div>
            </div>
            <label class="pg-toggle" id="toggle-sym">
              <input type="checkbox" id="opt-sym" />
              <span class="pg-knob"></span>
            </label>
          </div>

          <!-- Exclude ambiguous chars toggle -->
          <div class="pg-row">
            <div>
              <div class="pg-lbl" id="lbl-ambig">Exclude ambiguous chars</div>
              <div class="pg-sub" id="lbl-ambig-sub">0 O l I 1 — easy to confuse</div>
            </div>
            <label class="pg-toggle" id="toggle-ambig">
              <input type="checkbox" id="opt-ambig" />
              <span class="pg-knob"></span>
            </label>
          </div>

        </div>
      </div><!-- /pane-pass -->


      <!-- ============================================================
           PASSPHRASE OPTIONS PANEL
           Hidden by default; shown when the "Passphrase" tab is active.
           ============================================================ -->
      <div id="pane-phrase" role="tabpanel"
           aria-labelledby="tab-phrase" style="display:none;">
        <div class="pg-card">

          <!-- Word count slider (3–8) -->
          <div class="pg-rrow">
            <label class="pg-lbl" id="lbl-word-count" for="pg-words">Word count</label>
            <input type="range" id="pg-words"
                   min="3" max="8" value="4" step="1" />
            <span class="pg-rval" id="pg-words-val">4</span>
          </div>

          <!-- Separator select -->
          <div class="pg-row">
            <div>
              <div class="pg-lbl" id="lbl-separator">Separator</div>
              <div class="pg-sub" id="lbl-sep-sub">between words</div>
            </div>
            <select id="pg-sep">
              <option value="-">hyphen -</option>
              <option value=".">dot .</option>
              <option value="_">underscore _</option>
              <option value=" ">space</option>
              <option value="#">hash #</option>
            </select>
          </div>

          <!-- Capitalize toggle -->
          <div class="pg-row">
            <div>
              <div class="pg-lbl" id="lbl-capitalize">Capitalize first letter</div>
            </div>
            <label class="pg-toggle" id="toggle-cap">
              <input type="checkbox" id="opt-capitalize" checked />
              <span class="pg-knob"></span>
            </label>
          </div>

          <!-- Append number toggle -->
          <div class="pg-row">
            <div>
              <div class="pg-lbl" id="lbl-append-num">Append a number</div>
            </div>
            <label class="pg-toggle" id="toggle-apnum">
              <input type="checkbox" id="opt-num-phrase" />
              <span class="pg-knob"></span>
            </label>
          </div>

        </div>
      </div><!-- /pane-phrase -->


      <!-- Generate button -->
      <button class="pg-generate" id="pg-gen">
        <svg class="icon" aria-hidden="true">
          <use href="#icon-sparkles"/>
        </svg>
        <!-- Text span so JS can translate just the label -->
        <span id="pg-gen-text">Generate</span>
      </button>

      <!-- Copy feedback toast (fades in/out via JS) -->
      <div class="pg-feedback" id="pg-feedback" aria-live="polite">
        <svg class="icon" aria-hidden="true">
          <use href="#icon-check"/>
        </svg>
        <span id="pg-feedback-text">Copied to clipboard!</span>
      </div>


      <!-- ============================================================
           HISTORY SECTION
           Last HISTORY_LIMIT entries, newest first.
           Populated entirely by JS — the empty placeholder below is
           the only static child.
           ============================================================ -->
      <div class="pg-hist-header">
        <span class="pg-hist-title">
          <svg class="icon" aria-hidden="true">
            <use href="#icon-clock"/>
          </svg>
          <!-- id="pg-hist-label" is targeted by applyTranslations() -->
          <span id="pg-hist-label">History</span>
        </span>
        <button class="pg-hist-clear" id="pg-hist-clear">Clear all</button>
      </div>

      <!-- History list — children injected by renderHistory() -->
      <div class="pg-hist-list" id="pg-hist-list">
        <div class="pg-empty" id="pg-empty">No passwords generated yet</div>
      </div>

    </div><!-- /pg -->
  </div><!-- /pg-wrapper -->


  <!--
    Main application script.
    Loaded at the bottom so all DOM elements exist before the script runs.
    Relies on the global functions (t, setLocale, getLocale) exported by
    i18n/translations.js which is already parsed at this point.
  -->
  <script src="js/script.js"></script>

</body>
</html>
